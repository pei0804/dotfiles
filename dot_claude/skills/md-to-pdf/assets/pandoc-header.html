<style>
  @page { margin: 18mm 16mm; }
  html { font-size: 10.5pt; }
  body {
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    line-height: 1.7;
    color: #1e293b;
    max-width: 100%;
  }
  /* frontmatter のタイトルは表紙見出しとして中央寄せ */
  h1.title {
    text-align: center;
    font-size: 21pt;
    line-height: 1.4;
    margin: 0.5em 0 1.6em;
    border: none;
  }
  /* 本文の見出し階層 */
  h1 { font-size: 17pt; border-bottom: 2px solid #cbd5e1; padding-bottom: .2em; margin: 1.6em 0 .6em; }
  h2 { font-size: 14pt; border-bottom: 1px solid #e2e8f0; padding-bottom: .15em; margin: 1.4em 0 .5em; }
  h3 { font-size: 12pt; color: #0f172a; margin: 1.2em 0 .4em; }
  h4 { font-size: 11pt; color: #334155; margin: 1em 0 .3em; }
  h1, h2, h3, h4 { break-after: avoid; page-break-after: avoid; font-weight: 700; }
  table { border-collapse: collapse; width: 100%; font-size: 9.5pt; margin: 1em 0; }
  th, td { border: 1px solid #cbd5e1; padding: 5px 8px; text-align: left; vertical-align: top; }
  th { background: #f1f5f9; }
  img { max-width: 100%; height: auto; display: block; margin: 1.2em auto; }
  figure { break-inside: avoid; page-break-inside: avoid; margin: 1.2em 0; }
  figcaption { display: none; }
  ul, ol { padding-left: 1.4em; }
  li { margin: .15em 0; }
  code { background: #f1f5f9; padding: 0 .2em; border-radius: 3px; }
  a { color: #1d4ed8; word-break: break-all; }
</style>
